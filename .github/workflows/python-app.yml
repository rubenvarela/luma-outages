# This workflow uses uv to install Python dependencies and run main.py.
# Python version and dependencies are pinned via .python-version and uv.lock.

name: Python application

on:
  schedule:
    - cron: '36 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
    - name: run program
      env:
        ghtoken: ${{ secrets.GHTOKEN }}
      run: |
        uv run main.py
    - name: Record heartbeat
      if: always()
      run: |
        mkdir -p status
        date -u +"%Y-%m-%dT%H:%M:%SZ" > status/last-run.txt
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add status/last-run.txt
        if ! git diff --cached --quiet; then
          git commit -m "chore: heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
        fi
