# This workflow will install Python dependencies, run main.py with Python 3.10
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  schedule:
    - cron: '36 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: run program
      env:
        ghtoken: ${{ secrets.GHTOKEN }}
        save_to_disk: 0
        save_to_github: 1
      run: |
        python main.py
    - name: Record heartbeat
      if: always()
      run: |
        mkdir -p status
        date -u +"%Y-%m-%dT%H:%M:%SZ" > status/last-run.txt
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add status/last-run.txt
        if ! git diff --cached --quiet; then
          git commit -m "chore: heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
        fi
